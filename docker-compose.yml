services:
  # PHP Application
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: ordis-app
    container_name: ordis-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./src:/var/www
    networks:
      - ordis-network

  # Node.js for Frontend
  node:
    image: node:22-alpine
    container_name: ordis-node
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./src:/var/www
    networks:
      - ordis-network
    command: npm run dev

  # Nginx Web Server
  web:
    image: nginx:alpine
    container_name: ordis-web
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - ordis-network

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: ordis-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-ordis_db}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_USER: ${DB_USERNAME:-ordis_user}
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - ordis-network

networks:
  ordis-network:
    driver: bridge

volumes:
  dbdata:
    driver: local
